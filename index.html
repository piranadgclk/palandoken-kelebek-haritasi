<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<title>Palandöken Kelebek Haritası</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.panel {
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
max-width:250px;
z-index:1000;
}

.panel h3 {
margin:0 0 10px 0;
}

.checkbox {
display:block;
margin-bottom:5px;
}
</style>
</head>

<body>

<div class="panel">
<h3>🦋 Türler</h3>

<label class="checkbox">
<input type="checkbox" checked onchange="toggleLayer('apollo')">
Parnassius apollo
</label>

<label class="checkbox">
<input type="checkbox" checked onchange="toggleLayer('polyommatus')">
Polyommatus
</label>

<label class="checkbox">
<input type="checkbox" checked onchange="toggleLayer('arethusa')">
Arethusana arethusa
</label>

<hr>

<b>Bilgi:</b><br>
Palandöken çevresinde gözlemlenen kelebek yoğunluk alanları.
</div>

<div id="map"></div>

<script>

var map = L.map('map').setView([39.9, 41.27], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 18
}).addTo(map);

// Tür katmanları
var layers = {};

layers.apollo = L.heatLayer([
[39.92,41.25,0.8],
[39.93,41.26,0.7]
]).addTo(map);

layers.polyommatus = L.heatLayer([
[39.91,41.28,0.9],
[39.90,41.27,0.8]
]).addTo(map);

layers.arethusa = L.heatLayer([
[39.94,41.24,0.7],
[39.95,41.23,0.6]
]).addTo(map);

// Aç / kapa
function toggleLayer(name){
if(map.hasLayer(layers[name])){
map.removeLayer(layers[name]);
}else{
map.addLayer(layers[name]);
}
}

</script>

</body>
</html>
