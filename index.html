<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<title>Palandöken Kelebek Haritası</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.panel {
position:absolute;
top:10px;
left:10px;
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,0.3);
max-width:300px;
z-index:1000;
font-size:14px;
}

.btn {
width:100%;
margin:5px 0;
padding:8px;
border:0;
border-radius:8px;
background:#2b6cb0;
color:white;
cursor:pointer;
}

.small { font-size:12px; color:#555; }
</style>
</head>

<body>

<div class="panel">
<h3>🦋 Palandöken Haritası</h3>

<button class="btn" onclick="loadGBIF()">GBIF verisini çek</button>
<button class="btn" onclick="toggleModel()">Isı haritasını aç/kapat</button>

<div id="status" class="small">Hazır</div>

<hr>

<div id="speciesList" class="small">Türler burada görünecek</div>

</div>

<div id="map"></div>

<script>

// Harita
var map = L.map('map').setView([39.88, 41.27], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 18
}).addTo(map);

// Model ısı haritası
var heatData = [
[39.86,41.25,0.8],
[39.88,41.28,0.9],
[39.91,41.24,0.7],
[39.93,41.30,0.6]
];

var heatLayer = L.heatLayer(heatData, {radius:25}).addTo(map);
var heatVisible = true;

function toggleModel(){
if(heatVisible){
map.removeLayer(heatLayer);
heatVisible = false;
}else{
heatLayer.addTo(map);
heatVisible = true;
}
}

// Tür katmanları
var speciesLayers = {};

function toggleSpecies(name){
if(map.hasLayer(speciesLayers[name])){
map.removeLayer(speciesLayers[name]);
}else{
map.addLayer(speciesLayers[name]);
}
}

// GBIF veri çekme
async function loadGBIF(){

document.getElementById("status").innerHTML = "Veri çekiliyor...";

let url = "https://api.gbif.org/v1/occurrence/search?country=TR&orderKey=797&hasCoordinate=true&limit=200";

let res = await fetch(url);
let data = await res.json();

speciesLayers = {};
document.getElementById("speciesList").innerHTML = "";

data.results.forEach(r => {

if(!r.decimalLatitude || !r.decimalLongitude || !r.species) return;

if(!speciesLayers[r.species]){
speciesLayers[r.species] = L.layerGroup().addTo(map);
}

let marker = L.circleMarker([r.decimalLatitude, r.decimalLongitude], {
radius:5
}).addTo(speciesLayers[r.species]);

marker.bindPopup(r.species);

});

// Tür listesi
let html = "";

Object.keys(speciesLayers).forEach(name => {
html += `
<label>
<input type="checkbox" checked onchange="toggleSpecies('${name.replace(/'/g,"")}')">
${name}
</label><br>`;
});

document.getElementById("speciesList").innerHTML = html;
document.getElementById("status").innerHTML = "Veri yüklendi";

}

</script>

</body>
</html>
